<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Salt PWA master icon — Lucide "cooking-pot" glyph, opaque full-bleed.
       Glyph centered at 1024/2 and sized to ~40% of canvas, well inside the
       maskable safe zone (central 80% circle). White stroke on warm gradient. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FB923C"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.36" r="0.6">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Full-bleed opaque background (no transparency, no pre-rounded corners) -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#glow)"/>

  <!-- Lucide cooking-pot: 24x24 source, transformed to center on the canvas.
       scale(20) => 40px rendered stroke from the source stroke-width="2". -->
  <g transform="translate(272 272) scale(20)"
     fill="none" stroke="#FFFFFF" stroke-width="2"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="M2 12h20"/>
    <path d="M20 12v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8"/>
    <path d="m4 8 16-4"/>
    <path d="m8.86 6.78-.45-1.81a2 2 0 0 1 1.45-2.43l1.94-.48a2 2 0 0 1 2.43 1.46l.45 1.8"/>
  </g>
</svg>
