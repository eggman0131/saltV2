# Dependabot configuration for the Salt pnpm monorepo.
# A single npm entry covers every workspace package via the root pnpm-lock.yaml.
# Routine minor/patch bumps are grouped into a couple of weekly PRs; majors stay
# individual so breaking upgrades get reviewed on their own.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      # Non-breaking production dependency bumps → one PR.
      production-minor-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      # Non-breaking dev/tooling bumps → one PR.
      dev-minor-patch:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    # Major updates match no group above, so Dependabot opens them as
    # individual PRs that warrant a closer look.
    ignore:
      # zod 4 is blocked: @genkit-ai/core (the sole zod source for the Genkit
      # stack) pins zod ^3.23.8 up to its latest release (1.37.0), so zod 4's
      # ZodObject fails Genkit's zod-3 ZodTypeAny constraint at every flow
      # boundary. Re-enable once a Genkit release accepts zod 4 and the lockstep
      # migration in #298 lands. (Minor/patch within zod 3 still flow normally.)
      - dependency-name: "zod"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions:
        patterns:
          - "*"
