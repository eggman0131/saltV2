name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read

jobs:
  # Decide whether a PR touches anything other than documentation. The heavy
  # emulator + Playwright suites are skipped for docs-only PRs, but this
  # workflow still TRIGGERS on every PR so the required status checks report
  # (a skipped required job passes; an un-triggered one would block merge
  # forever waiting on a context that never appears).
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.detect.outputs.code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # Non-PR events (push to main) always run the full suite — main is the
          # deploy source and must stay genuinely green.
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "Event '$EVENT_NAME' is not a pull_request — running full CI."
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed=$(git diff --name-only "$BASE_SHA...$HEAD_SHA")
          echo "Changed files:"
          echo "$changed"

          # Documentation-only allowlist. Anything NOT matched here counts as
          # code and triggers the full suite, so a mixed code+docs PR runs
          # everything. Conservative by design.
          non_doc=$(echo "$changed" | grep -vE '^(docs/|.*\.md$|LICENSE$)' || true)

          if [ -n "$non_doc" ]; then
            echo "Non-documentation changes detected — running full CI."
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "Documentation-only change — skipping emulator + e2e suites."
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  ci:
    name: Lint, typecheck, test, boundary
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '10.33.0'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Boundary tests
        run: pnpm boundary:test

      - name: Provenance check
        run: pnpm provenance:check

      - name: Theme check
        run: pnpm theme:check

  # Isolated Vitest emulator integration stack (issue #84, Phase 3/4).
  # Firestore+Auth-only composed stack on its own project/ports
  # (docker-compose.vitest.yml, project salt-vitest-emulators, 8082/9101).
  # scripts/test-emulator.mjs owns the full lifecycle: down -v -> up --wait
  # (healthcheck-gated) -> run suites -> always down -v in a finally. No Java,
  # no CF prebuild, no Playwright. Sequenced before e2e (e2e `needs:` this job)
  # so the two composed stacks are never concurrent — non-concurrent by design
  # per #84; this is also the cheaper suite, so it fails fast ahead of e2e.
  vitest-integration:
    name: Vitest integration (emulator)
    runs-on: ubuntu-latest
    # Skipped (→ passes as a required check) for documentation-only PRs.
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '10.33.0'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `pnpm test:emulator` = node scripts/test-emulator.mjs: brings up the
      # composed Vitest stack healthcheck-gated and always tears it down with
      # `down -v` in a finally. Docker is preinstalled on ubuntu-latest.
      # firebase-sync/.env.test is committed, so checkout is all CI needs to
      # retarget the client SDK to ports 8082/9101.
      - name: Run Vitest emulator integration suites
        run: pnpm test:emulator

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    # Sequenced after the Vitest integration stack so the e2e composed stack
    # (docker-compose.test.yml, project test-emulators, 8081/9100/5002) is
    # never concurrent with the Vitest one — non-concurrent by design (#84).
    # Skipped (→ passes as a required check) for documentation-only PRs.
    needs: [changes, vitest-integration]
    if: ${{ needs.changes.outputs.code == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '10.33.0'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            pnpm --filter @salt/web-pwa exec playwright install-deps chromium
          else
            pnpm --filter @salt/web-pwa exec playwright install --with-deps chromium
          fi

      # globalSetup.ts owns the whole lifecycle (issue #84, Phase 2): it builds
      # the Cloud Functions bundle, then `docker compose ... up --wait` brings
      # up the healthcheck-gated emulator stack (the gate replaces the old 120s
      # trigger-registration poll), and spawns the e2e Vite server on :5174.
      # No host Java / firebase-emulator cache / manual Vite — emulators are
      # containerized (jars baked into the image). CI=true makes globalTeardown
      # run `docker compose ... down -v`, reaping the whole process tree.
      - name: Run E2E tests
        run: pnpm --filter @salt/web-pwa e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web-pwa/playwright-report/
          retention-days: 14

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: apps/web-pwa/test-results/
          retention-days: 14

      - name: Surface LD replay URLs
        if: failure()
        run: echo "::notice::Search the 'Run E2E tests' log above for 'LD replay:' lines to find session-replay URLs for failed tests."
