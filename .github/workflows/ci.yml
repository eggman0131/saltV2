name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  ci:
    name: Lint, typecheck, test, boundary
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '10.33.0'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Boundary tests
        run: pnpm boundary:test

      - name: Provenance check
        run: pnpm provenance:check

      - name: Theme check
        run: pnpm theme:check

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '10.33.0'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Firebase emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ hashFiles('package.json') }}

      - name: Build cloud functions
        run: pnpm --filter @salt/cloud-functions build

      - name: Install Playwright browsers
        run: pnpm --filter @salt/web-pwa exec playwright install --with-deps chromium

      - name: Start Firebase emulators
        run: |
          pnpm exec firebase emulators:start --project=demo-salt --only=auth,firestore > /tmp/firebase-emulators.log 2>&1 &
          echo "Firebase emulators starting (PID $!)"

      - name: Wait for Firebase emulators
        run: |
          echo "Waiting for auth emulator on port 9099..."
          timeout 90 bash -c 'until curl -s http://127.0.0.1:9099 > /dev/null 2>&1; do sleep 2; done'
          echo "Emulators ready"

      - name: Run E2E tests
        run: pnpm --filter @salt/web-pwa e2e

      - name: Show Firebase emulator log
        if: failure()
        run: cat /tmp/firebase-emulators.log 2>/dev/null || echo "No firebase log found"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web-pwa/playwright-report/
          retention-days: 14

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: apps/web-pwa/test-results/
          retention-days: 14

      - name: Surface LD replay URLs
        if: failure()
        run: echo "::notice::Search the 'Run E2E tests' log above for 'LD replay:' lines to find session-replay URLs for failed tests."
