name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read

jobs:
  # Decide whether a PR touches app code. The heavy emulator + Playwright
  # suites are skipped for non-app PRs (docs / CI / tooling — see the allowlist
  # below), but this workflow still TRIGGERS on every PR so the required status checks report
  # (a skipped required job passes; an un-triggered one would block merge
  # forever waiting on a context that never appears).
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.detect.outputs.code }}
      uptodate: ${{ steps.detect.outputs.uptodate }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # Non-PR events (push to main) always run the full suite — main is the
          # deploy source and must stay genuinely green. Nothing to rebase
          # against, so uptodate is trivially true.
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "Event '$EVENT_NAME' is not a pull_request — running full CI."
            echo "code=true" >> "$GITHUB_OUTPUT"
            echo "uptodate=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed=$(git diff --name-only "$BASE_SHA...$HEAD_SHA")
          echo "Changed files:"
          echo "$changed"

          # Non-app allowlist. These paths cannot change the runtime behaviour
          # of the app, so the heavy emulator + Playwright suites (which only
          # exercise app behaviour) are pure waste for them:
          #   - docs/, *.md, LICENSE        — documentation
          #   - .github/                    — CI / dependabot config
          #   - .claude/                    — AI-agent tooling (commands, settings)
          #   - .vscode/, .editorconfig,
          #     .nvmrc, .gitignore,
          #     .vexpignore                 — editor / meta dotfiles
          # Anything NOT matched here counts as code and triggers the full
          # suite, so a mixed code+non-app PR runs everything. Conservative by
          # design. Lint/typecheck/unit/boundary (the `ci` job) always run
          # regardless — only the heavy suites are gated.
          #
          # Caveat: a change to the e2e / vitest-integration job setup *inside*
          # .github/workflows/ci.yml will itself skip those suites, so such a
          # change cannot be validated green by this run — verify it on a
          # follow-up PR that also touches app code.
          non_app=$(echo "$changed" | grep -vE '^(docs/|.*\.md$|LICENSE$|\.github/|\.claude/|\.vscode/|\.editorconfig$|\.nvmrc$|\.gitignore$|\.vexpignore$)' || true)

          if [ -n "$non_app" ]; then
            echo "App-impacting changes detected — running full CI."
            code=true
          else
            echo "Non-app change (docs / CI / tooling) — skipping emulator + e2e suites."
            code=false
          fi
          echo "code=$code" >> "$GITHUB_OUTPUT"

          # Up-to-date gate. The "Main" ruleset uses
          # strict_required_status_checks_policy (= "require branches to be up
          # to date before merging"), so a branch behind origin/main CANNOT
          # merge until it is rebased — and that rebase re-triggers this whole
          # workflow. Running the heavy emulator + Playwright suites on a branch
          # that is already behind is therefore pure waste: the result is thrown
          # away at rebase. When behind, mark uptodate=false so the heavy jobs
          # skip (a skipped required check passes; strict mode still blocks the
          # merge until the branch is updated, at which point CI runs for real).
          # Only meaningful when code=true (the heavy suites would otherwise run).
          uptodate=true
          if [ "$code" = "true" ]; then
            git fetch --no-tags origin main
            if git merge-base --is-ancestor FETCH_HEAD "$HEAD_SHA"; then
              echo "Branch is up to date with origin/main — heavy suites will run."
            else
              echo "Branch is behind origin/main — rebase required before merge; skipping heavy suites this run."
              uptodate=false
            fi
          fi
          echo "uptodate=$uptodate" >> "$GITHUB_OUTPUT"

  ci:
    name: Lint, typecheck, test, boundary
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: '10.33.0'

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Boundary tests
        run: pnpm boundary:test

      - name: Provenance check
        run: pnpm provenance:check

      - name: Theme check
        run: pnpm theme:check

  # Isolated Vitest emulator integration stack (issue #84, Phase 3/4).
  # Firestore+Auth-only composed stack on its own project/ports
  # (docker-compose.vitest.yml, project salt-vitest-emulators, 8082/9101).
  # scripts/test-emulator.mjs owns the full lifecycle: down -v -> up --wait
  # (healthcheck-gated) -> run suites -> always down -v in a finally. No Java,
  # no CF prebuild, no Playwright.
  #
  # Gated behind `ci` (lint/typecheck/unit/boundary) so the heavy emulator
  # suites only start once the cheap checks pass. Runs CONCURRENTLY with e2e:
  # the #84 "never concurrent" rule is a SINGLE-HOST constraint (local dev runs
  # both stacks on one machine). In CI each job gets its own ubuntu-latest
  # runner, so the two composed stacks never share ports/volumes/Docker state —
  # the structural isolation (distinct project + ports 8082/9101 vs 8081/9100)
  # is belt-and-suspenders here. They stay non-concurrent for LOCAL runs only.
  #
  # Skipped (→ passes as a required check) for non-app PRs (docs / CI / tooling)
  # and for branches behind origin/main (strict ruleset forces a rebase that
  # re-triggers CI — see the `changes` job's uptodate gate).
  vitest-integration:
    name: Vitest integration (emulator)
    runs-on: ubuntu-latest
    needs: [changes, ci]
    if: ${{ needs.changes.outputs.code == 'true' && needs.changes.outputs.uptodate == 'true' }}

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: '10.33.0'

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `pnpm test:emulator` = node scripts/test-emulator.mjs: brings up the
      # composed Vitest stack healthcheck-gated and always tears it down with
      # `down -v` in a finally. Docker is preinstalled on ubuntu-latest.
      # firebase-sync/.env.test is committed, so checkout is all CI needs to
      # retarget the client SDK to ports 8082/9101.
      - name: Run Vitest emulator integration suites
        run: pnpm test:emulator

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    # Gated behind `ci`; runs CONCURRENTLY with vitest-integration. Separate
    # runners mean the e2e composed stack (docker-compose.test.yml, project
    # test-emulators, 8081/9100/5002) never collides with the Vitest stack
    # (8082/9101) — the #84 non-concurrency rule is a single-host constraint
    # that does not apply across GitHub Actions jobs (see vitest-integration).
    # Skipped (→ passes as a required check) for non-app PRs (docs / CI / tooling)
    # and for branches behind origin/main (see the `changes` job's uptodate gate).
    needs: [changes, ci]
    if: ${{ needs.changes.outputs.code == 'true' && needs.changes.outputs.uptodate == 'true' }}

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: '10.33.0'

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            pnpm --filter @salt/web-pwa exec playwright install-deps chromium
          else
            pnpm --filter @salt/web-pwa exec playwright install --with-deps chromium
          fi

      # globalSetup.ts owns the whole lifecycle (issue #84, Phase 2): it builds
      # the Cloud Functions bundle, then `docker compose ... up --wait` brings
      # up the healthcheck-gated emulator stack (the gate replaces the old 120s
      # trigger-registration poll), and spawns the e2e Vite server on :5174.
      # No host Java / firebase-emulator cache / manual Vite — emulators are
      # containerized (jars baked into the image). CI=true makes globalTeardown
      # run `docker compose ... down -v`, reaping the whole process tree.
      - name: Run E2E tests
        run: pnpm --filter @salt/web-pwa e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/web-pwa/playwright-report/
          retention-days: 14

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results
          path: apps/web-pwa/test-results/
          retention-days: 14

      - name: Surface LD replay URLs
        if: failure()
        run: echo "::notice::Search the 'Run E2E tests' log above for 'LD replay:' lines to find session-replay URLs for failed tests."
