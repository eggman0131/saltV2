name: Deploy Staging

# Runs after the CI workflow finishes successfully on main. main is protected
# (PR + required status checks), so this is the post-merge, post-green deploy of
# the exact merged commit — the trunk-based "merge to main -> staging" path.
#
# workflow_dispatch is a manual escape hatch: re-deploy staging on demand, or
# deploy when an unrelated CI flake is blocking the automatic trigger. It runs
# the current main HEAD.
on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

# id-token: write is REQUIRED for Workload Identity Federation — it lets the job
# mint the short-lived OIDC token that google-github-actions/auth exchanges for
# GCP credentials. No long-lived key is stored anywhere.
permissions:
  contents: read
  id-token: write

# Never run two staging deploys at once; queue rather than cancel so a deploy is
# not interrupted half-way.
concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to staging
    # Auto path: only when CI passed (workflow_run also fires on failure).
    # Manual path: always allowed (deliberate maintainer action).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    # Scopes WIF_PROVIDER / WIF_SERVICE_ACCOUNT to the staging GitHub Environment.
    environment: staging

    steps:
      - uses: actions/checkout@v7
        with:
          # Auto: the exact commit CI validated. Manual: current main HEAD.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          # fetch-depth: 2 brings down the merged commit + its first parent so
          # the guard step below can diff them. (Manual runs don't diff.)
          fetch-depth: 2

      # workflow_run triggers cannot use paths/paths-ignore, so the deploy-vs-skip
      # decision is computed here instead. Deploy only when the merged commit
      # touched a deploy-relevant path; manual runs always deploy. Allowlist, not
      # denylist, and fail-safe toward deploying: any error resolving the diff
      # defaults to should_deploy=true so we never silently skip a real change.
      - name: Determine whether a deploy-relevant path changed
        id: guard
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — always deploy."
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          head="${{ github.event.workflow_run.head_sha }}"
          # First parent of the merged commit = previous main HEAD (squash/merge
          # commits to main have a single first parent).
          if ! base="$(git rev-parse "${head}^" 2>/dev/null)"; then
            echo "Could not resolve parent of ${head}; defaulting to deploy."
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! changed="$(git diff --name-only "${base}" "${head}" 2>/dev/null)"; then
            echo "git diff failed; defaulting to deploy."
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Changed files between ${base} and ${head}:"
          echo "${changed}"

          # Allowlist of deploy-relevant paths. Any match -> deploy. apps/** and
          # packages/** already cover nested package.json files, so the bare
          # package.json anchor only matches the root manifest.
          if echo "${changed}" | grep -Eq '^(apps/|packages/|firebase\.json$|firestore\.rules$|firestore\.indexes\.json$|storage\.rules$|package\.json$|pnpm-lock\.yaml$|\.github/workflows/deploy-staging\.yml$)'; then
            echo "Deploy-relevant change detected -> deploy."
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "No deploy-relevant change (docs/non-code only) -> skip deploy."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v6
        if: ${{ steps.guard.outputs.should_deploy == 'true' }}
        with:
          version: '10.33.0'

      # Node 20, NOT 22, for the deploy CLI: firebase-tools' bundled
      # google-auth-library (gaxios/undici) throws "Premature close" on the
      # sts.googleapis.com WIF token exchange under Node 22.23.0 (the patch
      # ubuntu-latest picked up ~2026-06-25 — the exact break). gcloud's own
      # exchange succeeds, proving WIF/IAM are fine; only the Node 22 HTTP
      # client is affected. The deployed Functions runtime stays node22 (an
      # esbuild --target, set in the CF build, independent of the CLI's Node).
      - uses: actions/setup-node@v7
        if: ${{ steps.guard.outputs.should_deploy == 'true' }}
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        if: ${{ steps.guard.outputs.should_deploy == 'true' }}
        run: pnpm install --frozen-lockfile

      # Builds the PWA with --mode staging so Vite loads apps/web-pwa/.env.staging
      # (staging Firebase config + PostHog browser key). Output -> apps/web-pwa/dist,
      # which firebase.json hosting serves.
      - name: Build web-pwa (staging)
        if: ${{ steps.guard.outputs.should_deploy == 'true' }}
        run: pnpm --filter @salt/web-pwa build:staging

      # Symbolicate staging exceptions: inject a chunk id into each built bundle,
      # upload the `sourcemap: 'hidden'` maps to PostHog Error Tracking, then
      # delete the .map files from dist/ — all BEFORE `firebase deploy`, so the
      # maps power stack traces in PostHog but are never served publicly (#359).
      # Needs no GCP auth, only the PostHog key, so it sits ahead of the WIF step.
      # host is REQUIRED — we are EU-region. POSTHOG_PROJECT_ID /
      # POSTHOG_CLI_API_KEY are `staging` Environment secrets so the upload lands
      # in the staging PostHog project.
      - name: Inject & upload source maps to PostHog
        if: ${{ steps.guard.outputs.should_deploy == 'true' }}
        uses: PostHog/upload-source-maps@v2
        with:
          directory: apps/web-pwa/dist
          project-id: ${{ secrets.POSTHOG_PROJECT_ID }}
          api-key: ${{ secrets.POSTHOG_CLI_API_KEY }}
          host: https://eu.posthog.com
          release-version: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Authenticate to Google Cloud (WIF)
        if: ${{ steps.guard.outputs.should_deploy == 'true' }}
        uses: google-github-actions/auth@v3
        with:
          project_id: s2-stage-ccb22
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      # Deploys all targets in firebase.json: hosting, functions, firestore rules
      # + indexes, and storage rules (canon icons, #148). Storage rules deploy
      # requires the project's default Storage bucket to already be provisioned —
      # a one-time setup outside this workflow (see docs/canon-icons.md §Storage).
      # The functions predeploy hook builds the CF bundle; GEMINI_API_KEY /
      # POSTHOG_API_KEY are already in this project's Secret Manager.
      - name: Deploy to Firebase (staging)
        if: ${{ steps.guard.outputs.should_deploy == 'true' }}
        run: pnpm exec firebase deploy -P staging --non-interactive --force

      # `firebase deploy --non-interactive` skips the "allow unauthenticated
      # invocations?" prompt, so newly created/updated 2nd-gen callables come up
      # PRIVATE and reject browser calls with a 403/no-CORS error (#234). The
      # callables auth the *user* inside the function; Cloud Run must still allow
      # allUsers to invoke. Re-apply that binding here. Idempotent.
      - name: Grant public invoker on client callables
        if: ${{ steps.guard.outputs.should_deploy == 'true' }}
        run: ./scripts/grant-callable-invokers.sh s2-stage-ccb22
