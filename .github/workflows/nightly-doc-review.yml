name: Nightly Doc Review

on:
  schedule:
    # 2 AM UTC every night
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  id-token: write

jobs:
  doc-review:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Compute review window
        id: window
        run: |
          COUNT=$(git log --since="24 hours ago" --oneline | wc -l | tr -d ' ')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "today=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          echo "Found $COUNT commit(s) in the last 24 hours"

      - name: Run nightly doc review
        if: steps.window.outputs.count != '0'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: >-
            --max-turns 40
            --model claude-sonnet-4-6
            --allowed-tools "Read,Edit,Write,Bash(git:*),Bash(gh:*)"
          prompt: |
            You are running a nightly documentation review for the Salt 2.0 monorepo.
            Today's date: ${{ steps.window.outputs.today }}

            ## Step 1 — Identify changed files

            Run:
              git log --since="24 hours ago" --oneline
              git diff --name-only $(git log --since="24 hours ago" --format="%H" | tail -1)^..HEAD

            Hold this list of changed files in mind for Step 2. For any file you
            actually need to inspect, use `git log --since="24 hours ago" -p -- <file>`
            on demand — do NOT diff every file up front.

            ## Step 2 — Route changed files to relevant docs

            Match each changed file against the table below. Only proceed with the
            docs in matched buckets. If NO changed file matches any bucket, output
            "Verdict C: no doc-relevant changes" and stop.

            | Path glob                                                                              | Docs to review                                                  |
            |----------------------------------------------------------------------------------------|-----------------------------------------------------------------|
            | `packages/domain/**`                                                                   | `docs/domain-implementation.md`, `docs/salt-architecture.md` (§3, §6) |
            | `packages/adapters/firebase-sync/**`                                                   | `docs/salt-architecture.md` (§6.1, §11), `docs/matching-pipeline.md` |
            | `packages/adapters/ld-observability/**`                                                | `docs/salt-architecture.md` (§6.2), `docs/matching-pipeline.md` |
            | `apps/cloud-functions/**`                                                              | `docs/matching-pipeline.md`, `docs/salt-architecture.md` (§8)   |
            | `apps/web-pwa/**`                                                                      | `docs/salt-architecture.md` (§7)                                |
            | `packages/ui-components/**`                                                            | `docs/design/ui-spec-v04.md` (and any other ui-spec doc cited in changed files) |
            | `pnpm-workspace.yaml`, root `package.json`, `eslint.config.*`, `.dependency-cruiser.*` | `CLAUDE.md`, `docs/salt-architecture.md` (§3, §11)              |
            | `.github/workflows/**`, `e2e/**`, top-level `*.md`-only changes                        | (none — skip)                                                   |

            ## Step 3 — Read the routed docs

            Read only the docs identified in Step 2. Read each at most once.

            ## Step 4 — Classify

            For each (matched bucket → doc) pair, pick exactly one verdict:

            **A — Docs need a simple update.**
            Code change is intentional and the docs just haven't caught up.
            Examples: a new package added to the layer map; a file renamed; an
            existing convention extended in an obvious way.
            → Update the docs automatically (Step 5A).

            **SPECIAL CASE — UI primitives are spec, not architecture.**
            Any change under `packages/ui-components/**` is NEVER Verdict A.
            The `ui-spec-vXX.md` docs are a "no invention" contract that drives
            primitive generation; auto-amending them undermines that contract. If
            you find drift between ui-components code and a ui-spec doc, treat as
            Verdict B and flag it for human review.

            **B — Drift, ambiguous, or UI-spec change.**
            Code change might violate intended architecture; you can't tell whether
            docs or code should change; OR the change is in `packages/ui-components/`.
            → Raise an issue (Step 5B). Do NOT touch any docs.

            **C — Everything is fine.**
            Routed docs already reflect the change accurately, or only no-impact
            paths (workflows, e2e, pure markdown) were touched.
            → Output a brief summary, done.

            ## Step 5 — Act

            **Verdict C:** Output a brief summary of what you reviewed and why no
            action is needed. Done.

            **Verdict A — simple doc update:**

            a) Create a GitHub issue to track the work:
               gh issue create \
                 --title "docs: update docs after ${{ steps.window.outputs.today }} commits" \
                 --body "Nightly review found stale documentation. Updating automatically."
               Capture the issue number from the URL it prints.

            b) Edit only the doc files identified in Step 2. Keep the same tone
               and structure. No padding.

            c) Commit and push directly to main:
               git config user.email "claude-nightly[bot]@users.noreply.github.com"
               git config user.name "claude-nightly[bot]"
               git add docs/ CLAUDE.md
               git commit -m "docs: update documentation after ${{ steps.window.outputs.today }} commits"
               git push origin main

            d) Close the issue:
               gh issue close <ISSUE_NUMBER> \
                 --comment "Updated the following docs:\n<bullet list of files and why>"

            **Verdict B — drift, ambiguous, or UI-spec change:**

            Raise an issue explaining the situation clearly. Do NOT edit any doc
            files.

               gh issue create \
                 --title "review: possible doc/code drift detected ${{ steps.window.outputs.today }}" \
                 --label "needs-review" \
                 --body "$(cat <<'BODY'
               ## What the nightly review found

               <Describe the commits that triggered this, with file names and a brief
               summary of what changed.>

               ## Why this needs a human decision

               <Explain specifically what looks like drift, what rule or doc it
               conflicts with, and why you couldn't confidently update the docs to
               match. For UI-spec changes, say so explicitly — those are always B.>

               ## Recommendation

               <State clearly what you think the right resolution is — fix the code,
               update the docs, or investigate further — and why.>
               BODY
               )"

            Leave the issue open for the team to resolve.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
