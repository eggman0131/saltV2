name: Deploy Production

# Production is a deliberate promotion, never automatic. Publishing a GitHub
# Release deploys that release's exact tagged commit to production — the same
# commit already validated on staging. workflow_dispatch is a manual path for
# re-deploy / rollback (deploy a chosen earlier tag). BOTH paths run in the
# `production` GitHub Environment, whose required-reviewer rule is the approval
# gate: nothing reaches prod until the maintainer approves the run.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag or SHA to deploy to production (manual re-deploy / rollback)'
        required: true

permissions:
  contents: read
  id-token: write # WIF OIDC token

# Never run two prod deploys at once; queue rather than cancel.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    # The approval gate. Also the source of WIF_PROVIDER / WIF_SERVICE_ACCOUNT —
    # the production deployer SA is bound to attribute.environment/production, so
    # only a job running in THIS environment can assume it (defence in depth on
    # top of the manual approval).
    environment: production

    steps:
      - uses: actions/checkout@v7
        with:
          # On release: the published tag. On manual dispatch: the chosen ref.
          ref: ${{ github.event.release.tag_name || inputs.ref }}

      - uses: pnpm/action-setup@v6
        with:
          version: '10.33.0'

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Default Vite mode is production -> loads apps/web-pwa/.env.production
      # (prod Firebase config + PostHog browser key). Output -> apps/web-pwa/dist.
      - name: Build web-pwa (production)
        run: pnpm --filter @salt/web-pwa build

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v3
        with:
          project_id: s2-prod-e46bd
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      # firebase-tools authenticates in CI via Application Default Credentials,
      # but ONLY "if gcloud is configured" — it does not consume the WIF
      # external-account credential file directly (the GOOGLE_APPLICATION_
      # CREDENTIALS path expects a service-account KEY). The auth step above
      # exports CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE, so once the gcloud SDK is
      # on PATH the CLI's ADC path resolves. ubuntu-latest stopped bundling
      # gcloud (~2026-06-25), which silently broke deploys: the credential file
      # is still created, but firebase deploy fails with "Failed to authenticate,
      # have you run firebase login?". Installing gcloud restores the ADC path.
      - name: Set up Cloud SDK (firebase-tools needs gcloud on PATH for ADC)
        uses: google-github-actions/setup-gcloud@v2

      # Deploys hosting, functions, firestore rules + indexes, and storage rules
      # (canon icons, #148) to production. Storage rules deploy requires the
      # project's default Storage bucket to already be provisioned — a one-time
      # setup outside this workflow (see docs/canon-icons.md §Storage). The
      # functions predeploy hook builds the workspace-free deploy artifact;
      # GEMINI_API_KEY / POSTHOG_API_KEY are already in prod Secret Manager.
      - name: Deploy to Firebase (production)
        run: pnpm exec firebase deploy -P production --non-interactive --force

      # `firebase deploy --non-interactive` skips the "allow unauthenticated
      # invocations?" prompt, so newly created/updated 2nd-gen callables come up
      # PRIVATE and reject browser calls with a 403/no-CORS error (#234). The
      # callables auth the *user* inside the function; Cloud Run must still allow
      # allUsers to invoke. Re-apply that binding here. Idempotent.
      - name: Grant public invoker on client callables
        run: ./scripts/grant-callable-invokers.sh s2-prod-e46bd
