name: Claude Assistant

# NOTE: deliberately NOT triggered by `issues: [opened, assigned]`.
# Creating an issue (e.g. via the /issue skill) must not auto-launch the
# bot — it used to fire here, post a comment, then die at --max-turns.
# On-demand only: @claude in a comment or PR review still works.
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    # On-demand only: repo owner AND an explicit @claude in the body.
    # Without the @claude gate the job spun up (then no-opped) on every
    # comment — including the MCP /phase-start, /phase-end and handoff
    # comments — which is noise and wasted runner starts. comment.body
    # covers issue_comment + pull_request_review_comment; review.body
    # covers pull_request_review.
    if: >
      github.actor == 'eggman0131' &&
      contains(github.event.comment.body || github.event.review.body, '@claude')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--max-turns 50 --max-budget-usd 2 --model claude-sonnet-4-6'
